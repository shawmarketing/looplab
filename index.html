@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Comic+Neue:wght@400;700&display=swap');
* { box-sizing: border-box; font-family: 'Comic Neue', cursive; }
body { margin: 0; }
.navbtn:hover { transform: translateY(-2px); }
.cta:hover { transform: translateY(-2px) scale(1.03); filter: brightness(1.05); }
.cta:active { transform: scale(0.97); }
.swatch:hover { transform: scale(1.12) !important; }
.card { transition: transform .2s, box-shadow .2s; }
.card.pop:hover { transform: translateY(-6px); box-shadow: 0 16px 40px rgba(0,0,0,.14); }
.pop { animation: pop .45s cubic-bezier(.2,1.3,.5,1) both; }
@keyframes pop { from { opacity:0; transform: scale(.9) translateY(14px);} to {opacity:1; transform:none;} }
.wiggle { display:inline-block; animation: wig 2.5s ease-in-out infinite; }
@keyframes wig { 0%,100%{transform:rotate(-3deg);} 50%{transform:rotate(3deg);} }
.blob { position:absolute; border-radius:50%; filter: blur(45px); opacity:.45; animation: float 12s ease-in-out infinite; }
.b1{ width:260px;height:260px; background:#ff2e9a; top:-60px; left:-60px;}
.b2{ width:220px;height:220px; background:#39ff14; top:30%; right:-70px; animation-delay:-3s;}
.b3{ width:200px;height:200px; background:#fff200; bottom:-60px; left:10%; animation-delay:-6s;}
.b4{ width:180px;height:180px; background:#b026ff; top:50%; left:40%; animation-delay:-9s;}
@keyframes float { 0%,100%{transform:translateY(0) translateX(0);} 50%{transform:translateY(-30px) translateX(20px);} }
input:focus, textarea:focus, select:focus { outline: 3px solid #ff2e9a44; border-color:#ff2e9a !important; }
.spin { animation: spin 1s linear infinite; display:inline-block; }
@keyframes spin { to { transform: rotate(360deg);} }

/* ---------- Responsive (mobile / small screens) ---------- */
@media (max-width: 640px) {
  /* header: stack logo above the nav, both centered, nav wraps */
  .site-header {
    flex-direction: column !important;
    gap: 12px;
    padding: 14px 12px !important;
  }
  .site-nav {
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
  }
  .site-nav .navbtn {
    padding: 8px 14px !important;
    font-size: 13px !important;
  }
}
@media (max-width: 380px) {
  .site-nav .navbtn { padding: 7px 11px !important; font-size: 12px !important; }
}
</style>

  }, 8000);
});
